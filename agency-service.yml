server:
  port: 8083
spring:
  application:
    name: agency-service
  datasource:
    url: jdbc:postgresql://localhost:5432/agency
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  config:
    import: "configserver:http://localhost:8888,vault://"
  cloud:
    config:
      label: main
    vault:
      uri: http://localhost:8200
      token: root
      kv:
        enabled: true
        backend: secret
        default-context: banking
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/banking
management:
  endpoints:
    web:
      exposure:
        include: "*"
